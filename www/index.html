<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UnGlobo: Risk It!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF6B9D;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #2C3E50;
            --danger: #FF4757;
            --success: #2ED573;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #game-container { width: 100%; height: 100%; position: relative; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }

        /* Menú Principal - Responsive */
        #menu-screen {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            z-index: 10;
            padding: 20px;
        }
        .menu-title {
            font-family: 'Fredoka One', cursive;
            color: var(--primary);
            text-shadow: 0 0 30px var(--primary), 0 8px 0 #c44569;
            margin-bottom: 10px;
            animation: pulse 2s ease-in-out infinite;
            text-align: center;
        }
        .menu-subtitle { font-size: 1.2rem; color: var(--secondary); margin-bottom: 30px; font-weight: 700; text-align: center; }
        @media (min-width: 768px) {
            .menu-title { font-size: 5rem; }
            .menu-subtitle { font-size: 1.5rem; margin-bottom: 50px; }
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .menu-form {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex; flex-direction: column; gap: 15px;
            width: 100%;
            max-width: 300px;
        }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { color: white; font-weight: 700; font-size: 1rem; }
        .form-group input {
            padding: 12px 15px; border: none; border-radius: 12px;
            font-size: 1rem; font-family: 'Nunito', sans-serif; font-weight: 700;
            background: rgba(255, 255, 255, 0.9); color: var(--dark);
            outline: none; transition: all 0.3s ease; width: 100%;
        }
        .form-group input:focus { transform: scale(1.02); box-shadow: 0 0 20px var(--secondary); }
        .btn-start {
            padding: 15px 30px; font-size: 1.2rem; font-family: 'Fredoka One', cursive;
            background: linear-gradient(135deg, var(--success) 0%, #26de81 100%);
            color: white; border: none; border-radius: 15px;
            cursor: pointer; transition: all 0.3s ease; margin-top: 15px;
            box-shadow: 0 6px 0 #218c53, 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        .btn-start:hover { transform: translateY(-2px); }
        .btn-start:active { transform: translateY(3px); box-shadow: 0 3px 0 #218c53; }
        .instructions { margin-top: 25px; color: rgba(255, 255, 255, 0.7); text-align: center; font-size: 0.9rem; max-width: 300px; line-height: 1.5; }

        /* Pantalla de Nombres */
        #names-screen {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            z-index: 12; overflow-y: auto; padding: 15px;
        }
        .names-title { font-family: 'Fredoka One', cursive; color: var(--secondary); text-shadow: 0 0 20px var(--secondary); margin-bottom: 10px; text-align: center; font-size: 1.8rem; }
        .names-subtitle { font-size: 1rem; color: rgba(255, 255, 255, 0.7); margin-bottom: 20px; text-align: center; }
        .names-form {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px; border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex; flex-direction: column; gap: 12px;
            max-height: 50vh; overflow-y: auto;
            width: 100%;
            max-width: 300px;
        }
        .name-input-group { display: flex; align-items: center; gap: 10px; }
        .name-input-group label { font-family: 'Fredoka One', cursive; font-size: 1rem; color: var(--accent); min-width: 30px; }
        .name-input-group input {
            flex: 1; padding: 10px 15px; border: none; border-radius: 10px;
            font-size: 1rem; font-family: 'Nunito', sans-serif; font-weight: 700;
            background: rgba(255, 255, 255, 0.9); color: var(--dark);
            outline: none; transition: all 0.3s ease;
        }
        .name-input-group input:focus { transform: scale(1.02); box-shadow: 0 0 15px var(--secondary); }
        .btn-play {
            padding: 15px 35px; font-size: 1.2rem; font-family: 'Fredoka One', cursive;
            background: linear-gradient(135deg, var(--primary) 0%, #e84a7f 100%);
            color: white; border: none; border-radius: 15px;
            cursor: pointer; transition: all 0.3s ease; margin-top: 15px;
            box-shadow: 0 6px 0 #c44569, 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        .btn-play:active { transform: translateY(3px); box-shadow: 0 3px 0 #c44569; }
        .btn-back {
            padding: 10px 25px; font-size: 0.9rem; font-family: 'Nunito', sans-serif; font-weight: 700;
            background: transparent; color: rgba(255, 255, 255, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 10px;
            cursor: pointer; transition: all 0.3s ease; margin-top: 12px;
        }
        .btn-back:active { background: rgba(255, 255, 255, 0.1); color: white; }

        /* Pantalla de Juego */
        #game-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        .game-header { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 5; width: 100%; padding: 0 10px; }
        .round-indicator { font-family: 'Fredoka One', cursive; font-size: 1rem; color: var(--accent); text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5); }
        .current-player { font-size: 1.3rem; color: white; font-weight: 900; text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5); }
        
        /* Score panel - responsive */
        .score-panel {
            position: absolute; 
            top: 80px; 
            right: 10px;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 15px;
            min-width: 150px; max-width: 180px;
            z-index: 5;
        }
        .score-panel h3 { color: var(--accent); font-family: 'Fredoka One', cursive; font-size: 1rem; margin-bottom: 10px; text-align: center; }
        .player-score { display: flex; justify-content: space-between; padding: 8px 10px; margin-bottom: 5px; border-radius: 8px; font-weight: 700; font-size: 0.85rem; transition: all 0.3s ease; }
        .player-score.active { background: var(--primary); color: white; transform: scale(1.05); }
        .player-score .name { color: white; }
        .player-score .points { color: var(--accent); }
        
        .game-info { 
            position: absolute; 
            bottom: 180px; 
            left: 50%; 
            transform: translateX(-50%); 
            text-align: center; 
            z-index: 5; 
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .hold-message { font-size: 1.2rem; color: white; font-weight: 700; text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5); animation: blink 1s ease-in-out infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .current-points { font-family: 'Fredoka One', cursive; font-size: 2.5rem; color: var(--success); text-shadow: 0 0 20px var(--success); }

        /* Botón de inflado para móvil */
        #inflate-btn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, #e84a7f 100%);
            border: 4px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-family: 'Fredoka One', cursive;
            font-size: 1rem;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 8px 0 #c44569, 0 15px 30px rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.2;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        #inflate-btn:active {
            transform: translateX(-50%) translateY(4px);
            box-shadow: 0 4px 0 #c44569, 0 8px 15px rgba(0, 0, 0, 0.3);
        }
        #inflate-btn.inflating {
            background: linear-gradient(135deg, var(--accent) 0%, #e6c84d 100%);
            box-shadow: 0 8px 0 #e6c84d, 0 15px 30px rgba(255, 230, 109, 0.4);
        }

        /* Efecto de hold indicator */
        .hold-indicator { position: absolute; bottom: 230px; left: 50%; transform: translateX(-50%); display: none; align-items: center; gap: 10px; z-index: 5; }
        .hold-icon { width: 40px; height: 40px; background: var(--secondary); border-radius: 50%; display: flex; justify-content: center; align-items: center; animation: bounce 0.5s ease-in-out infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .hold-icon svg { width: 20px; height: 20px; fill: white; }
        .hold-text { font-size: 0.9rem; color: white; font-weight: 700; }

        /* Pantalla de Game Over */
        #gameover-screen {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            z-index: 15;
            padding: 15px;
            overflow-y: auto;
        }
        .gameover-title { font-family: 'Fredoka One', cursive; font-size: 2rem; color: var(--accent); text-shadow: 0 0 30px var(--accent); margin-bottom: 20px; text-align: center; }
        .ranking-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px 30px; border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 350px;
        }
        .ranking-item { display: flex; align-items: center; padding: 10px 15px; margin-bottom: 8px; border-radius: 10px; font-weight: 700; transition: all 0.3s ease; }
        .ranking-item.gold { background: linear-gradient(135deg, #ffd700 0%, #ffb700 100%); color: #1a1a2e; transform: scale(1.05); }
        .ranking-item.silver { background: linear-gradient(135deg, #c0c0c0 0%, #a8a8a8 100%); color: #1a1a2e; }
        .ranking-item.bronze { background: linear-gradient(135deg, #cd7f32 0%, #b87333 100%); color: #1a1a2e; }
        .ranking-item.default { background: rgba(255, 255, 255, 0.1); color: white; }
        .ranking-position { font-family: 'Fredoka One', cursive; font-size: 1.2rem; width: 40px; }
        .ranking-name { flex: 1; font-size: 1rem; }
        .ranking-points { font-size: 1rem; color: var(--accent); }
        .btn-restart {
            margin-top: 25px; padding: 15px 35px; font-size: 1.2rem; font-family: 'Fredoka One', cursive;
            background: linear-gradient(135deg, var(--primary) 0%, #e84a7f 100%);
            color: white; border: none; border-radius: 15px;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 6px 0 #c44569, 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        .btn-restart:active { transform: translateY(3px); box-shadow: 0 3px 0 #c44569; }

        /* Ocultar botón de inflado en escritorio */
        @media (min-width: 769px) {
            #inflate-btn { display: none; }
            .game-info { 
                bottom: 30px; 
                gap: 5px;
            }
            .hold-indicator { 
                bottom: 100px; 
                display: flex;
            }
            .score-panel { top: 50%; right: 30px; transform: translateY(-50%); padding: 25px; min-width: 220px; }
            .score-panel h3 { font-size: 1.3rem; }
            .player-score { font-size: 1rem; padding: 10px 15px; }
            .gameover-title { font-size: 3rem; margin-bottom: 40px; }
            .ranking-container { padding: 40px 60px; min-width: 400px; }
            .ranking-item { padding: 15px 25px; margin-bottom: 10px; }
            .ranking-position { font-size: 1.5rem; width: 50px; }
            .ranking-name { font-size: 1.2rem; }
            .ranking-points { font-size: 1.3rem; }
            .btn-restart { margin-top: 40px; padding: 20px 50px; font-size: 1.3rem; }
            .hold-message { font-size: 1rem; }
            .current-points { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <!-- Menú Principal -->
        <div id="menu-screen">
            <h1 class="menu-title">UnGlobo</h1>
            <p class="menu-subtitle">🎈 Risk It! 🎈</p>
            <div class="menu-form">
                <div class="form-group">
                    <label>👥 Jugadores</label>
                    <input type="number" id="players-input" min="2" max="8" value="4">
                </div>
                <div class="form-group">
                    <label>🔄 Rondas</label>
                    <input type="number" id="rounds-input" min="1" max="10" value="5">
                </div>
                <button class="btn-start" id="btn-start">INICIAR</button>
            </div>
            <p class="instructions">
                Mantén el botón para inflar el globo.<br>
                Suelta antes de que explote para cobrar tus puntos.<br>
                ¡El que arriesga más gana!
            </p>
        </div>

        <!-- Pantalla de Nombres -->
        <div id="names-screen">
            <h2 class="names-title">👥 Nombres</h2>
            <p class="names-subtitle">Ingresa el nombre de cada jugador</p>
            <div class="names-form" id="names-form"></div>
            <button class="btn-play" id="btn-play">JUGAR</button>
            <button class="btn-back" id="btn-back">← Volver</button>
        </div>

        <!-- Pantalla de Juego -->
        <div id="game-screen">
            <div class="game-header">
                <div class="round-indicator" id="round-display">Ronda 1/5</div>
                <div class="current-player" id="player-display">Jugador 1</div>
            </div>
            <div class="score-panel" id="score-panel">
                <h3>🏆 Puntuaciones</h3>
                <div id="scores-list"></div>
            </div>
            <div class="hold-indicator" id="hold-indicator">
                <div class="hold-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                </div>
                <span class="hold-text">Mantén presionado</span>
            </div>
            <div class="game-info">
                <div class="hold-message" id="hold-message">¡Mantén presionado!</div>
                <div class="current-points" id="current-points">0</div>
            </div>
            <!-- Botón para inflar en móvil -->
            <button id="inflate-btn">MANTENER<br>PRESIONADO</button>
        </div>

        <!-- Pantalla de Game Over -->
        <div id="gameover-screen">
            <h1 class="gameover-title">🏆 RANKING 🏆</h1>
            <div class="ranking-container" id="ranking-container"></div>
            <button class="btn-restart" id="btn-restart">VOLVER AL MENÚ</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            minPlayers: 2, maxPlayers: 8, minRounds: 1, maxRounds: 10,
            balloonMinSize: 1.0, balloonMaxSize: 5.0, explosionMinSize: 1.5,
            growthSpeed: 0.015, pointsPerTick: 1, tickInterval: 50,
            playerColors: ['#FF6B9D', '#4ECDC4', '#FFE66D', '#A8E6CF', '#FF8A5B', '#25CED1', '#FF6F61', '#845EC2']
        };

        let gameState = {
            numPlayers: 4, numRounds: 5, players: [], currentPlayerIndex: 0, currentRound: 1,
            isPlaying: false, isInflating: false, balloonSize: 1.0, balloonExplosionPoint: 0,
            currentPoints: 0, tickCount: 0, hasExploded: false, hasCashedOut: false,
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const inflateBtn = document.getElementById('inflate-btn');
        let animationId;
        let particles = [], explosionParticles = [], cashOutParticles = [];
        let shockwave = null;

        function resizeCanvas() { 
            canvas.width = canvas.parentElement.clientWidth; 
            canvas.height = canvas.parentElement.clientHeight; 
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color, type = 'sparkle') {
                this.x = x; this.y = y; this.color = color; this.type = type;
                this.vx = (Math.random() - 0.5) * 8; this.vy = (Math.random() - 0.5) * 8;
                this.life = 1; this.decay = 0.02 + Math.random() * 0.02;
                this.size = 3 + Math.random() * 5; this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.1; this.life -= this.decay; this.rotation += this.rotationSpeed; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.life; ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
                if (this.type === 'sparkle') {
                    ctx.fillStyle = this.color; ctx.beginPath();
                    ctx.moveTo(0, -this.size); ctx.lineTo(this.size * 0.3, 0);
                    ctx.lineTo(0, this.size); ctx.lineTo(-this.size * 0.3, 0);
                    ctx.closePath(); ctx.fill();
                } else if (this.type === 'circle') { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(0, 0, this.size, 0, Math.PI * 2); ctx.fill(); }
                else if (this.type === 'confetti') { ctx.fillStyle = this.color; ctx.fillRect(-this.size / 2, -this.size / 4, this.size, this.size / 2); }
                ctx.restore();
            }
        }

        class Shockwave { constructor(x, y) { this.x = x; this.y = y; this.radius = 50; this.life = 1; } update() { this.radius += 30; this.life -= 0.03; } draw() { ctx.save(); ctx.globalAlpha = this.life * 0.5; ctx.strokeStyle = '#fff'; ctx.lineWidth = 10 * this.life; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.stroke(); ctx.restore(); } }

        function getBalloonColor(size) {
            const ratio = (size - CONFIG.balloonMinSize) / (CONFIG.balloonMaxSize - CONFIG.balloonMinSize);
            if (ratio < 0.25) return { fill: '#4ECDC4', shadow: '#2ab7a9' };
            else if (ratio < 0.5) return { fill: '#A8E6CF', shadow: '#7bc9a6' };
            else if (ratio < 0.75) return { fill: '#FFE66D', shadow: '#e6c84d' };
            else return { fill: '#FF6B9D', shadow: '#e64a7f' };
        }

        function getRandomExplosionPoint() { return CONFIG.explosionMinSize + Math.random() * (CONFIG.balloonMaxSize - CONFIG.explosionMinSize); }

        function drawBalloon(centerX, centerY, size, isExploded = false) {
            if (isExploded) return;
            const baseRadius = Math.min(canvas.width, canvas.height) * 0.15;
            const radius = baseRadius * size, colors = getBalloonColor(size);
            const shake = size > 2 ? (size - 2) * 2 : 0;
            const shakeX = shake > 0 ? (Math.random() - 0.5) * shake : 0, shakeY = shake > 0 ? (Math.random() - 0.5) * shake : 0;
            const drawX = centerX + shakeX, drawY = centerY + shakeY;
            ctx.save();
            const gradient = ctx.createRadialGradient(drawX - radius * 0.3, drawY - radius * 0.3, 0, drawX, drawY, radius);
            gradient.addColorStop(0, colors.fill); gradient.addColorStop(0.7, colors.fill); gradient.addColorStop(1, colors.shadow);
            ctx.fillStyle = gradient; ctx.beginPath(); ctx.arc(drawX, drawY, radius, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)'; ctx.beginPath(); ctx.ellipse(drawX - radius * 0.35, drawY - radius * 0.35, radius * 0.25, radius * 0.15, -Math.PI / 4, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(drawX, drawY + radius);
            for (let i = 0; i <= 5; i++) { const t = i / 5; ctx.lineTo(drawX + Math.sin(t * Math.PI * 4) * 10, drawY + radius + t * 40); }
            ctx.stroke();
            ctx.fillStyle = colors.shadow; ctx.beginPath(); ctx.moveTo(drawX - 10, drawY + radius); ctx.lineTo(drawX + 10, drawY + radius); ctx.lineTo(drawX, drawY + radius + 15); ctx.closePath(); ctx.fill();
            ctx.restore();
        }

        function showNamesScreen() {
            const numPlayers = parseInt(document.getElementById('players-input').value);
            const numRounds = parseInt(document.getElementById('rounds-input').value);
            gameState.numPlayers = Math.max(CONFIG.minPlayers, Math.min(CONFIG.maxPlayers, numPlayers));
            gameState.numRounds = Math.max(CONFIG.minRounds, Math.min(CONFIG.maxRounds, numRounds));
            const namesForm = document.getElementById('names-form'); namesForm.innerHTML = '';
            for (let i = 0; i < gameState.numPlayers; i++) {
                const group = document.createElement('div');
                group.className = 'name-input-group';
                group.innerHTML = `<label>${i + 1}</label><input type="text" id="player-name-${i}" placeholder="Jugador ${i + 1}" value="Jugador ${i + 1}" maxlength="15">`;
                namesForm.appendChild(group);
            }
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('names-screen').style.display = 'flex';
        }

        function initGame() {
            gameState.players = [];
            for (let i = 0; i < gameState.numPlayers; i++) {
                const nameInput = document.getElementById(`player-name-${i}`);
                let name = nameInput ? nameInput.value.trim() : `Jugador ${i + 1}`;
                if (!name) name = `Jugador ${i + 1}`;
                gameState.players.push({ name: name, color: CONFIG.playerColors[i % CONFIG.playerColors.length], totalPoints: 0, roundsPlayed: 0 });
            }
            gameState.currentPlayerIndex = 0; gameState.currentRound = 1; gameState.isPlaying = true;
            initRound();
        }

        function initRound() {
            gameState.balloonSize = 1.0; gameState.balloonExplosionPoint = getRandomExplosionPoint();
            gameState.currentPoints = 0; gameState.tickCount = 0;
            gameState.hasExploded = false; gameState.hasCashedOut = false; gameState.isInflating = false;
            updateUI();
        }

        function startInflating() { 
            if (!gameState.isPlaying || gameState.hasExploded || gameState.hasCashedOut) return; 
            gameState.isInflating = true; 
            inflateBtn.classList.add('inflating');
        }
        function stopInflating() { 
            if (!gameState.isInflating) return; 
            gameState.isInflating = false; 
            inflateBtn.classList.remove('inflating');
            cashOut(); 
        }

        function updateGame() {
            if (!gameState.isPlaying) return;
            if (gameState.isInflating && !gameState.hasExploded && !gameState.hasCashedOut) {
                const growthFactor = 1 + CONFIG.growthSpeed; gameState.balloonSize *= growthFactor;
                gameState.tickCount++; gameState.currentPoints = Math.floor(gameState.tickCount * 0.5) + Math.floor(gameState.balloonSize * 100);
                if (gameState.tickCount % 3 === 0) {
                    const centerX = canvas.width / 2, centerY = canvas.height / 2 - 50;
                    const baseRadius = Math.min(canvas.width, canvas.height) * 0.15;
                    const radius = baseRadius * gameState.balloonSize;
                    for (let i = 0; i < 2; i++) {
                        const angle = Math.random() * Math.PI * 2, dist = radius * (0.8 + Math.random() * 0.2);
                        const px = centerX + Math.cos(angle) * dist, py = centerY + Math.sin(angle) * dist;
                        const colors = ['#FFE66D', '#fff', '#4ECDC4'];
                        particles.push(new Particle(px, py, colors[Math.floor(Math.random() * colors.length)], 'sparkle'));
                    }
                }
                if (gameState.balloonSize >= gameState.balloonExplosionPoint) explode();
            }
            updateUI();
        }

        function cashOut() {
            gameState.hasCashedOut = true; gameState.isInflating = false;
            gameState.players[gameState.currentPlayerIndex].totalPoints += gameState.currentPoints;
            gameState.players[gameState.currentPlayerIndex].roundsPlayed++;
            const centerX = canvas.width / 2, centerY = canvas.height / 2 - 50;
            const baseRadius = Math.min(canvas.width, canvas.height) * 0.15;
            for (let i = 0; i < 30; i++) { const angle = Math.random() * Math.PI * 2, dist = baseRadius * gameState.balloonSize; cashOutParticles.push(new Particle(centerX + Math.cos(angle) * dist, centerY + Math.sin(angle) * dist, '#2ED573', 'confetti')); }
            setTimeout(() => nextTurn(), 1000);
        }

        function explode() {
            gameState.hasExploded = true; gameState.isInflating = false;
            const centerX = canvas.width / 2, centerY = canvas.height / 2 - 50;
            shockwave = new Shockwave(centerX, centerY);
            for (let i = 0; i < 50; i++) {
                const angle = Math.random() * Math.PI * 2, speed = 5 + Math.random() * 15;
                const particle = new Particle(centerX, centerY, getBalloonColor(gameState.balloonSize).fill, Math.random() > 0.5 ? 'circle' : 'confetti');
                particle.vx = Math.cos(angle) * speed; particle.vy = Math.sin(angle) * speed;
                explosionParticles.push(particle);
            }
            setTimeout(() => nextTurn(), 1500);
        }

        function nextTurn() {
            gameState.currentPlayerIndex++;
            if (gameState.currentPlayerIndex >= gameState.numPlayers) { gameState.currentPlayerIndex = 0; gameState.currentRound++; }
            if (gameState.currentRound > gameState.numRounds) endGame(); else initRound();
        }

        function endGame() { gameState.isPlaying = false; showGameOver(); }

        function updateUI() {
            document.getElementById('round-display').textContent = `Ronda ${gameState.currentRound}/${gameState.numRounds}`;
            document.getElementById('player-display').textContent = gameState.players[gameState.currentPlayerIndex].name;
            document.getElementById('current-points').textContent = gameState.currentPoints;
            const scoresList = document.getElementById('scores-list'); scoresList.innerHTML = '';
            gameState.players.forEach((player, index) => {
                const div = document.createElement('div');
                div.className = `player-score ${index === gameState.currentPlayerIndex ? 'active' : ''}`;
                div.innerHTML = `<span class="name">${player.name}</span><span class="points">${player.totalPoints}</span>`;
                scoresList.appendChild(div);
            });
            const holdMessage = document.getElementById('hold-message');
            if (gameState.hasExploded) { holdMessage.textContent = '💥 EXPLOTÓ!'; holdMessage.style.color = 'var(--danger)'; }
            else if (gameState.hasCashedOut) { holdMessage.textContent = '✅ COBRADO!'; holdMessage.style.color = 'var(--success)'; }
            else { holdMessage.textContent = '¡Mantén presionado!'; holdMessage.style.color = 'white'; }
        }

        function showMenu() { document.getElementById('menu-screen').style.display = 'flex'; document.getElementById('names-screen').style.display = 'none'; document.getElementById('game-screen').style.display = 'none'; document.getElementById('gameover-screen').style.display = 'none'; }
        function showGame() { document.getElementById('menu-screen').style.display = 'none'; document.getElementById('names-screen').style.display = 'none'; document.getElementById('game-screen').style.display = 'flex'; document.getElementById('gameover-screen').style.display = 'none'; }
        function showGameOver() {
            document.getElementById('menu-screen').style.display = 'none'; document.getElementById('names-screen').style.display = 'none'; document.getElementById('game-screen').style.display = 'none'; document.getElementById('gameover-screen').style.display = 'flex';
            const ranking = [...gameState.players].sort((a, b) => b.totalPoints - a.totalPoints);
            const container = document.getElementById('ranking-container'); container.innerHTML = '';
            ranking.forEach((player, index) => {
                const div = document.createElement('div');
                let className = 'ranking-item default';
                if (index === 0) className = 'ranking-item gold';
                else if (index === 1) className = 'ranking-item silver';
                else if (index === 2) className = 'ranking-item bronze';
                const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣', '6️⃣', '7️⃣', '8️⃣'];
                div.className = className;
                div.innerHTML = `<span class="ranking-position">${medals[index]}</span><span class="ranking-name">${player.name}</span><span class="ranking-points">${player.totalPoints} pts</span>`;
                container.appendChild(div);
            });
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const bgGradient = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, 0, canvas.width / 2, canvas.height / 2, canvas.width);
            bgGradient.addColorStop(0, '#2C3E50'); bgGradient.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = bgGradient; ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (gameState.isPlaying && !gameState.hasExploded) drawBalloon(canvas.width / 2, canvas.height / 2 - 50, gameState.balloonSize);
            particles = particles.filter(p => p.life > 0); particles.forEach(p => { p.update(); p.draw(); });
            explosionParticles = explosionParticles.filter(p => p.life > 0); explosionParticles.forEach(p => { p.update(); p.draw(); });
            cashOutParticles = cashOutParticles.filter(p => p.life > 0); cashOutParticles.forEach(p => { p.update(); p.draw(); });
            if (shockwave) { shockwave.update(); shockwave.draw(); if (shockwave.life <= 0) shockwave = null; }
            updateGame(); animationId = requestAnimationFrame(gameLoop);
        }

        // Event listeners
        document.getElementById('btn-start').addEventListener('click', () => showNamesScreen());
        document.getElementById('btn-play').addEventListener('click', () => { showGame(); initGame(); });
        document.getElementById('btn-back').addEventListener('click', () => showMenu());
        document.getElementById('btn-restart').addEventListener('click', () => showMenu());

        // Keyboard controls (desktop)
        document.addEventListener('keydown', (e) => { if (e.code === 'Space' && !e.repeat) { e.preventDefault(); startInflating(); } });
        document.addEventListener('keyup', (e) => { if (e.code === 'Space') { e.preventDefault(); stopInflating(); } });

        // Touch/click button controls (mobile)
        inflateBtn.addEventListener('mousedown', (e) => { e.preventDefault(); startInflating(); });
        inflateBtn.addEventListener('mouseup', (e) => { e.preventDefault(); stopInflating(); });
        inflateBtn.addEventListener('mouseleave', (e) => { if (gameState.isInflating) stopInflating(); });
        
        inflateBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startInflating(); });
        inflateBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopInflating(); });

        // Canvas touch controls (alternative)
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startInflating(); });
        canvas.addEventListener('touchend', (e) => { e.preventDefault(); stopInflating(); });
        canvas.addEventListener('mousedown', (e) => { startInflating(); });
        canvas.addEventListener('mouseup', (e) => { stopInflating(); });

        showMenu(); gameLoop();
    </script>
</body>
</html>
